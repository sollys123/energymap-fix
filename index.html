<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电力市场综合热力图 v4</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://cdn.staticfile.net/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.staticfile.net/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.staticfile.net/babel-standalone/7.22.20/babel.min.js"></script>
<script src="https://cdn.staticfile.net/echarts/5.4.3/echarts.min.js"></script>
<link href="https://cdn.staticfile.net/lxgw-wenkai-screen-webfont/1.7.0/style.min.css" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="root"></div>

<script>
(function(){
  const saved = window.__SAVED_DATA__ || null;
  const MAP_CACHE_KEY = '__HEATMAP_MAP_CACHE__';
  try {
    const cachedMaps = JSON.parse(localStorage.getItem(MAP_CACHE_KEY) || '{}');
    window.__CHINA_GEOJSON__ = window.__CHINA_GEOJSON__ || cachedMaps.china || null;
    window.__PROVINCE_GEOJSONS__ = window.__PROVINCE_GEOJSONS__ || cachedMaps.provinces || {};
  } catch (e) {
    window.__CHINA_GEOJSON__ = window.__CHINA_GEOJSON__ || null;
    window.__PROVINCE_GEOJSONS__ = window.__PROVINCE_GEOJSONS__ || {};
  }
  if (saved) {
    try { localStorage.setItem('__HEATMAP_LAST_SAVED_DATA__', JSON.stringify(saved)); } catch (e) {}
  } else {
    try {
      const lastSaved = localStorage.getItem('__HEATMAP_LAST_SAVED_DATA__');
      if (lastSaved) window.__SAVED_DATA__ = JSON.parse(lastSaved);
    } catch (e) {}
  }
})();
</script>
<script type="text/babel" src="./app.js"></script>
</body>
</html>
